<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Documentos – Rio Ave</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <header class="header">
        <img src="{{ url_for('static', filename='img/logo-rio-ave.png') }}" alt="Rio Ave Logo" class="logo">
        <h1>Portal de imposto de renda – Rio Ave</h1>
        <p>Encontre seus impostos de renda rapidamente informando seus dados.</p>
    </header>

    <main class="main-container">
        <section class="form-section">
            <form id="formulario" class="form-box">
                <label for="nome">Nome completo/CNPJ</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo ou CNPJ" required>

                <label for="numero">Número do imóvel</label>
                <input type="text" id="numero" name="numero" placeholder="Ex: 1 ou 234" required>

                <label for="letra">Letra do imóvel (opcional)</label>
                <input type="text" id="letra" name="letra" placeholder="Ex: A" maxlength="1">
                   
                <label for="ano_ir">Ano do imposto de renda</label>
                <select id="ano_ir" name="ano_ir" required>
                    <option value="IR-2025">IR-2025</option>
                </select>


                <label for="empreendimento">Empreendimento</label>
                <select id="empreendimento" name="empreendimento" required>
                    <option value="">Selecione o empreendimento</option>
                    <option value="empreendimento.a">Empreendimento A</option>
                    <option value="empreendimento.b">Empreendimento B</option>
                </select>

                <div
                    id="turnstile-widget"
                    class="cf-turnstile"
                    data-sitekey="{{ turnstile_site_key }}"
                    data-callback="turnstileSucesso"
                    data-expired-callback="turnstileExpirado"
                    data-error-callback="turnstileErro"
                ></div>

                <button type="submit" id="btnBuscar" class="btn-submit" disabled>
                    Buscar Documento
                </button>

                <div id="loader" class="loader hidden">
                    <span class="spinner"></span>
                    Buscando documento...
                </div>

                <div id="mensagem" class="mensagem hidden"></div>

                <div id="resultado" class="hidden">
                    <button type="button" id="btnDownload" class="btn-download"></button>
                </div>
            </form>
        </section>
    </main>

<a
    href="mailto:suporte@rioave.com.br?subject=Suporte Rio Ave&body=Olá, preciso de ajuda com meus documentos."
    target="_blank"
    rel="noopener noreferrer"
    class="email-suporte"
>
    <img src="{{ url_for('static', filename='img/gmail.png') }}" alt="Email">
    <span>Suporte</span>
</a>

    <footer class="footer">
        <p>© Rio Ave – Todos os direitos reservados</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
