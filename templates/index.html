<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Documentos – Rio Ave</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <header class="header">
        <img src="{{ url_for('static', filename='img/logo-rio-ave.png') }}" alt="Rio Ave Logo" class="logo">
        <h1>Portal de Documentos – Rio Ave</h1>
        <p>Encontre seus documentos rapidamente informando seus dados.</p>
    </header>

    <main class="main-container">
        <section class="form-section">
            <form id="formulario" class="form-box">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" placeholder="Ex: 1 ou 234" required>

                <label for="letra">Letra (opcional)</label>
                <input type="text" id="letra" name="letra" placeholder="Ex: A" maxlength="1">

                <label for="empreendimento">Empreendimento</label>
                <select id="empreendimento" name="empreendimento" required>
                    <option value="">Selecione o empreendimento</option>
                    <option value="empreendimento.a">Empreendimento A</option>
                    <option value="empreendimento.b">Empreendimento B</option>
                </select>

                <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>

                <button type="submit" class="btn-submit">Buscar Documento</button>

                <div id="loader" class="loader hidden">
                    <span class="spinner"></span>
                    Buscando documento...
                </div>

                <div id="mensagem" class="mensagem hidden"></div>

                <div id="resultado" class="hidden">
                    <button type="button" id="btnDownload" class="btn-download"></button>
                </div>
            </form>
        </section>
    </main>

    <a
        href="https://wa.me/5581999999999?text=Olá,%20preciso%20de%20ajuda%20com%20meus%20documentos%20Rio%20Ave."
        target="_blank"
        rel="noopener noreferrer"
        class="whatsapp-suporte"
    >
        <img src="{{ url_for('static', filename='img/whatsapp.svg') }}" alt="WhatsApp">
        <span>Suporte</span>
    </a>

    <footer class="footer">
        <p>© Rio Ave – Todos os direitos reservados</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
